<script>
(function() {
    const container = document.getElementById('gradient-bg');
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(
        35, window.innerWidth / window.innerHeight, 0.1, 100
    );
    camera.position.set(0, 0.5, 0.4);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    container.appendChild(renderer.domElement);

    const vertexShader = `
        uniform vec2 uFrequency;
        uniform float uTime;
        uniform float uAmount;
        uniform float uSpeed;
        uniform vec3 uColor[5];
        varying vec2 vUv;
        varying vec3 vColor;

        vec4 permute(vec4 x){return mod(((x*34.0)+1.0)*x, 289.0);}
        vec4 taylorInvSqrt(vec4 r){return 1.79284291400159 - 0.85373472095314 * r;}

        float snoise(vec3 v){
            const vec2 C = vec2(1.0/6.0, 1.0/3.0);
            const vec4 D = vec4(0.0, 0.5, 1.0, 2.0);
            vec3 i = floor(v + dot(v, C.yyy));
            vec3 x0 = v - i + dot(i, C.xxx);
            vec3 g = step(x0.yzx, x0.xyz);
            vec3 l = 1.0 - g;
            vec3 i1 = min(g.xyz, l.zxy);
            vec3 i2 = max(g.xyz, l.zxy);
            vec3 x1 = x0 - i1 + C.xxx;
            vec3 x2 = x0 - i2 + 2.0* C.xxx;
            vec3 x3 = x0 - 1.0 + 3.0 * C.xxx;
            i = mod(i, 289.0);
            vec4 p = permute(permute(permute(
                i.z + vec4(0.0, i1.z, i2.z, 1.0))
                + i.y + vec4(0.0, i1.y, i2.y, 1.0))
                + i.x + vec4(0.0, i1.x, i2.x, 1.0));
            float n_ = 1.0/7.0;
            vec3 ns = n_ * D.wyz - D.xzx;
            vec4 j = p -49.0 * floor(p * ns.z * ns.z);
            vec4 x_ = floor(j * ns.z);
            vec4 y_ = floor(j - 7.0 * x_);
            vec4 x = x_ * ns.x + ns.yyyy;
            vec4 y = y_ * ns.x + ns.yyyy;
            vec4 h = 1.0 - abs(x) - abs(y);
            vec4 b0 = vec4(x.xy, y.xy);
            vec4 b1 = vec4(x.zw, y.zw);
            vec4 s0 = floor(b0) * 2.0 + 1.0;
            vec4 s1 = floor(b1) * 2.0 + 1.0;
            vec4 sh = -step(h, vec4(0.0));
            vec4 a0 = b0.xzyw + s0.xzyw * sh.xxyy;
            vec4 a1 = b1.xzyw + s1.xzyw * sh.zzww;
            vec3 p0 = vec3(a0.xy, h.x);
            vec3 p1 = vec3(a0.zw, h.y);
            vec3 p2 = vec3(a1.xy, h.z);
            vec3 p3 = vec3(a1.zw, h.w);
            vec4 norm = taylorInvSqrt(vec4(dot(p0,p0), dot(p1,p1), dot(p2,p2), dot(p3,p3)));
            p0 *= norm.x; p1 *= norm.y; p2 *= norm.z; p3 *= norm.w;
            vec4 m = max(0.6 - vec4(dot(x0,x0), dot(x1,x1), dot(x2,x2), dot(x3,x3)), 0.0);
            m = m * m;
            return 42.0 * dot(m*m, vec4(dot(p0,x0), dot(p1,x1), dot(p2,x2), dot(p3,x3)));
        }

        void main() {
            vec4 modelPosition = modelMatrix * vec4(position, 1.0);
            vec2 noiseCoord = uv * vec2(uFrequency.x, uFrequency.y);
            float noise = snoise(vec3(
                noiseCoord.x + uTime * 0.02,
                noiseCoord.y,
                uTime * uSpeed
            ));
            modelPosition.y += noise * uAmount;

            vColor = uColor[4];
            for(int i = 0; i < 4; i++){
                float noiseFlow = 0.0002 + float(i) * 0.05;
                float noiseSpeed = 0.0001 + float(i) * 0.03;
                float noiseSeed = 1.0 + float(i) * 10.0;
                float noiseCeiling = 0.6 + float(i) * 0.08;
                float n = smoothstep(0.1, noiseCeiling, snoise(vec3(
                    noiseCoord.x *0.3 + uTime * noiseFlow,
                    noiseCoord.y * 0.6,
                    uTime * noiseSpeed + noiseSeed
                )));
                vColor = mix(vColor, uColor[i], n);
            }

            gl_Position = projectionMatrix * viewMatrix * modelPosition;
            vUv = uv;
        }
    `;

    const fragmentShader = `
        precision mediump float;
        varying vec3 vColor;
        void main(){
            gl_FragColor = vec4(vColor, 1.0);
        }
    `;

    
    const uniforms = {
        uTime:{ value: 0 },
        uAmount:    { value: 0.06 },
        uSpeed:     { value: 0.02 },
        uFrequency: { value: new THREE.Vector2(3, 6) },
        uColor: {
            value: [
                new THREE.Color("#4ACF61"),
                new THREE.Color("#D0D3D5"),
                new THREE.Color("#023047"),
                new THREE.Color("#73DB67"),
                new THREE.Color("#5C5656")
            ]
        }
    };

    const geometry = new THREE.PlaneGeometry(1.5, 1.5, 200, 200);
    const material = new THREE.ShaderMaterial({
        vertexShader,
        fragmentShader,
        uniforms,
        wireframe: false
    });
    const mesh = new THREE.Mesh(geometry, material);
    mesh.rotation.x = -Math.PI / 2;
    scene.add(mesh);

    const clock = new THREE.Clock();
    function animate() {
        requestAnimationFrame(animate);
        uniforms.uTime.value = clock.getElapsedTime();
        renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
})();
</script>

    document.querySelectorAll('a[href^="#"]').forEach(anchor => {
        anchor.addEventListener("click", function (e) {
            e.preventDefault();
            var id = this.getAttribute("href").substr(1);
            if (!window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
                document.querySelector(`[id='${decodeURIComponent(id)}']`).scrollIntoView({
                    behavior: "smooth"
                });
            } else {
                document.querySelector(`[id='${decodeURIComponent(id)}']`).scrollIntoView();
            }
            if (id === "top") {
                history.replaceState(null, null, " ");
            } else {
                history.pushState(null, null, `#${id}`);
            }
        });
    });
