  var fileMap = {};

  var desktop = document.getElementById('mac-desktop');

  var gridCtr = document.getElementById('files-grid-container');

  var finderDH = document.getElementById('finder-drag-handle');
  var sidebarDH = document.getElementById('sidebar-drag-handle');

  var fwContent = document.getElementById('fw-content');

  var mode = 'login';
  var finderFileId = null;
  var finderIsFullscreen = false;
  var strips = new Map();
  var zones = [null, null, null];

  function deskRect() { return desktop.getBoundingClientRect(); }

  

  function getZoneRects() {
    var rect = deskRect();
    var dockWidth = 76;
    var padding = 6;
    var availableWidth = rect.width - dockWidth;
    var zoneWidth = availableWidth / 3;
    var result = [];
    for (var i = 0; i < 3; i++) {
      result.push({
        left: dockWidth + i * zoneWidth + padding,
        top: padding,
        width: zoneWidth - padding * 2,
        height: rect.height - padding * 2,
        hitLeft: rect.left + dockWidth + i * zoneWidth,
        hitRight: rect.left + dockWidth + (i + 1) * zoneWidth,
        hitTop: rect.top,
        hitBottom: rect.bottom
      });
    }
    return result;
  }

  function hitZone(cx, cy) {
    var zrs = getZoneRects();
    for (var i = 0; i < 3; i++) {
      var z = zrs[i];
      if (cx >= z.hitLeft && cx < z.hitRight && cy >= z.hitTop && cy < z.hitBottom) return i;
    }
    return -1;
  }

  function findEmptyZone() {
    for (var i = 0; i < 3; i++) {
      if (zones[i] === null) return i;
    }
    return -1;
  }

  function showSnap(zi) {
    if (zi< 0) { snapPrev.classList.remove('visible'); return; }
    var z = getZoneRects()[zi];
    snapPrev.style.left = z.left + 'px';
    snapPrev.style.top = z.top + 'px';
    snapPrev.style.width = z.width + 'px';
    snapPrev.style.height = z.height + 'px';
    snapPrev.classList.add('visible');
  }

  function hideSnap() { snapPrev.classList.remove('visible'); }

  function buildDock() {
    dock.innerHTML = '';
    for (var i = 0; i < FILES.length; i++) {
      var f = FILES[i];
      var slot = document.createElement('div');
      slot.className = 'dock-slot';
      var item = document.createElement('div');
      item.className = 'dock-item';
      var active = strips.has(f.id) || (mode === 'finder' && finderFileId === f.id);
      if (active) item.classList.add('dock-active');
      item.innerHTML = '<span class="icon-inner-text" style="font-size:8px">' + f.name + '</span><div class="dock-tooltip">' + f.name + '</div>';
      if (active) item.innerHTML += '<div class="dock-dot"></div>';
      (function (file) {
        item.addEventListener('click', function () { onDockClick(file); });
      })(f);
      slot.appendChild(item);
      dock.appendChild(slot);
    }
  }

  function showDock() {
    dock.classList.remove('hidden');
    requestAnimationFrame(function () { dock.classList.remove('dock-hide'); });
  }

  function hideDock() {
    dock.classList.add('dock-hide');

  function onDockClick(file) {
    if (mode === 'finder') {
      finderFileId = file.id;
      showFinderFile(file);
      refreshSidebar();
      buildDock();
      return;
    }
    if (strips.has(file.id)) {
      var s = strips.get(file.id);
      s.el.style.transition = 'none';
      s.el.style.boxShadow = '0 0 0 3px var(--system-blue), 0 12px 40px rgba(0,0,0,.25)';
      setTimeout(function () { s.el.style.transition = ''; s.el.style.boxShadow = ''; }, 400);
      return;
    }
    var zi = findEmptyZone();
    if (zi < 0) return;
    createStrip(file, zi);
    buildDock();
  }

  function finderToCenter() {
    finderIsFullscreen = false;
    finder.classList.remove('fullscreen', 'dragging-win');
    finder.style.left = '';
    finder.style.top = '';

  function openFinder(file) {
    mode = 'finder';
    finderFileId = file.id;
    gridCtr.classList.add('hidden');
    strips.forEach(function (val, id) { removeStrip(id, true); });
    showDock();
    buildDock();
    finderToCenter();
    finder.classList.remove('hidden', 'show');

    requestAnimationFrame(function () { finder.classList.add('show'); });

  function refreshSidebar() {

  (function () {
    var dragging = false, sx, sy, ol, ot;
    function onDown(e) {
      if (e.target.closest('.window-controls')) return;
      if (finderIsFullscreen) return;
      e.preventDefault();
      dragging = true;
      var r = finder.getBoundingClientRect();

      sx = e.clientX;
      sy = e.clientY;

      finder.style.top = ot + 'px';

      if (!dragging) return;
      finder.style.left = (ol + e.clientX - sx) + 'px';
      finder.style.top = (ot + e.clientY - sy) + 'px';
    });
    document.addEventListener('mouseup', function () {
      if (!dragging) return;
      dragging = false;
      finder.classList.remove('dragging-win');

  function goToFolder() {

  function finderToStripMode() {
    var file = fileMap[finderFileId];

    setTimeout(function () {
      finder.classList.add('hidden');

  function createStrip(file, zoneIdx) {
    if (strips.has(file.id)) return;
    var zr = getZoneRects()[zoneIdx];
    var el = document.createElement('div');
    el.className = 'strip strip-enter';
    el.dataset.fid = file.id;
    el.innerHTML =
      '<div class="strip-header">' +
        '<div class="s-controls">' +
          '<span class="ctrl ctrl-close"></span>' +
          '<span class="ctrl ctrl-mini"></span>' +
          '<span class="ctrl ctrl-max"></span>' +
        '</div>' +
        '<span class="s-title">' + file.name + '</span>' +
        '<span class="s-spacer"></span>' +
      '</div>' +
      '<div class="strip-body"><pre>' + file.content + '</pre></div>';
    el.style.left = zr.left + 'px';
    el.style.top = zr.top + 'px';
    el.style.width = zr.width + 'px';
    el.style.height = zr.height + 'px';
    desktop.appendChild(el);
    zones[zoneIdx] = file.id;
    strips.set(file.id, { el: el, zoneIdx: zoneIdx });
    requestAnimationFrame(function () {
      requestAnimationFrame(function () {
        el.classList.remove('strip-enter');
      });
    });
    el.querySelector('.ctrl-close').addEventListener('click', function (e) {
      e.stopPropagation();
      removeStrip(file.id);});
    el.querySelector('.ctrl-mini').addEventListener('click', function (e) {
      e.stopPropagation();
      stripToFinder(file);
    });
    el.querySelector('.ctrl-max').addEventListener('click', function (e) {
      e.stopPropagation();
      stripToFinder(file);
    });initStripDrag(el, file.id);
  }

  function removeStrip(fid, silent) {
    var s = strips.get(fid);
    if (!s) return;
    zones[s.zoneIdx] = null;
    strips.delete(fid);
    if (!silent) {
      s.el.style.transform = 'scale(.9)';
      s.el.style.opacity = '0';
      setTimeout(function () { s.el.remove(); }, 300);
      buildDock();
      if (strips.size === 0) {
        mode = 'grid';
        hideDock();
        setTimeout(function () {
          gridCtr.classList.remove('hidden');
          renderGrid();
        }, 300);
      }
    } else {
      s.el.remove();
    }
  }

  function stripToFinder(file) {
    strips.forEach(function (val, id) { removeStrip(id, true); });
    zones[0] = null;
    zones[1] = null;
    zones[2] = null;
    openFinder(file);
  }

  function initStripDrag(el, fid) {
    var handle = el.querySelector('.s-title');
    var dragging = false, startX, startY, origLeft, origTop, origZone;

    handle.addEventListener('mousedown', function (e) {
      e.preventDefault();
      dragging = true;
      var s = strips.get(fid);
      origZone = s.zoneIdx;
      origLeft = parseFloat(el.style.left);
      origTop = parseFloat(el.style.top);
      startX = e.clientX;
      startY = e.clientY;
      el.classList.add('dragging');
      zones[origZone] = null;
    });

    document.addEventListener('mousemove', function (e) {
      if (!dragging) return;
      el.style.left = (origLeft + e.clientX - startX) + 'px';
      el.style.top = (origTop + e.clientY - startY) + 'px';var zi = hitZone(e.clientX, e.clientY);
      showSnap(zi >= 0 && zones[zi] === null ? zi : -1);
    });

    document.addEventListener('mouseup', function (e) {
      if (!dragging) return;
      dragging = false;
      el.classList.remove('dragging');
      hideSnap();
      var zi = hitZone(e.clientX, e.clientY);
      var targetZone;
      if (zi >= 0&& zones[zi] === null) {
        targetZone = zi;
      } else if (zi >= 0 && zones[zi] !== null && zones[zi] !== fid) {
        var otherFid = zones[zi];
        var otherS = strips.get(otherFid);
        var origZR = getZoneRects()[origZone];
        otherS.zoneIdx = origZone;
        zones[origZone] = otherFid;
        otherS.el.style.left = origZR.left + 'px';
        otherS.el.style.top = origZR.top + 'px';
        otherS.el.style.width = origZR.width + 'px';
        otherS.el.style.height = origZR.height + 'px';
        targetZone = zi;
      } else {
        targetZone = origZone;
      }
      var zr = getZoneRects()[targetZone];
      zones[targetZone] = fid;
      strips.get(fid).zoneIdx = targetZone;
      el.style.left = zr.left + 'px';
      el.style.top = zr.top + 'px';
      el.style.width = zr.width + 'px';
      el.style.height = zr.height + 'px';});
  }

  window.addEventListener('resize', function () {
    strips.forEach(function (s) {
      var zr = getZoneRects()[s.zoneIdx];
      s.el.style.left = zr.left + 'px';
      s.el.style.top = zr.top + 'px';
      s.el.style.width = zr.width + 'px';
      s.el.style.height = zr.height + 'px';
    });
  });
})();

<script>
(function() {
    const container = document.getElementById('gradient-bg');
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(
        35, window.innerWidth / window.innerHeight, 0.1, 100
    );
    camera.position.set(0, 0.5, 0.4);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    container.appendChild(renderer.domElement);

    const vertexShader = `
        uniform vec2 uFrequency;
        uniform float uTime;
        uniform float uAmount;
        uniform float uSpeed;
        uniform vec3 uColor[5];
        varying vec2 vUv;
        varying vec3 vColor;

        vec4 permute(vec4 x){return mod(((x*34.0)+1.0)*x, 289.0);}
        vec4 taylorInvSqrt(vec4 r){return 1.79284291400159 - 0.85373472095314 * r;}

        float snoise(vec3 v){
            const vec2 C = vec2(1.0/6.0, 1.0/3.0);
            const vec4 D = vec4(0.0, 0.5, 1.0, 2.0);
            vec3 i = floor(v + dot(v, C.yyy));
            vec3 x0 = v - i + dot(i, C.xxx);
            vec3 g = step(x0.yzx, x0.xyz);
            vec3 l = 1.0 - g;
            vec3 i1 = min(g.xyz, l.zxy);
            vec3 i2 = max(g.xyz, l.zxy);
            vec3 x1 = x0 - i1 + C.xxx;
            vec3 x2 = x0 - i2 + 2.0* C.xxx;
            vec3 x3 = x0 - 1.0 + 3.0 * C.xxx;
            i = mod(i, 289.0);
            vec4 p = permute(permute(permute(
                i.z + vec4(0.0, i1.z, i2.z, 1.0))
                + i.y + vec4(0.0, i1.y, i2.y, 1.0))
                + i.x + vec4(0.0, i1.x, i2.x, 1.0));
            float n_ = 1.0/7.0;
            vec3 ns = n_ * D.wyz - D.xzx;
            vec4 j = p -49.0 * floor(p * ns.z * ns.z);
            vec4 x_ = floor(j * ns.z);
            vec4 y_ = floor(j - 7.0 * x_);
            vec4 x = x_ * ns.x + ns.yyyy;
            vec4 y = y_ * ns.x + ns.yyyy;
            vec4 h = 1.0 - abs(x) - abs(y);
            vec4 b0 = vec4(x.xy, y.xy);
            vec4 b1 = vec4(x.zw, y.zw);
            vec4 s0 = floor(b0) * 2.0 + 1.0;
            vec4 s1 = floor(b1) * 2.0 + 1.0;
            vec4 sh = -step(h, vec4(0.0));
            vec4 a0 = b0.xzyw + s0.xzyw * sh.xxyy;
            vec4 a1 = b1.xzyw + s1.xzyw * sh.zzww;
            vec3 p0 = vec3(a0.xy, h.x);
            vec3 p1 = vec3(a0.zw, h.y);
            vec3 p2 = vec3(a1.xy, h.z);
            vec3 p3 = vec3(a1.zw, h.w);
            vec4 norm = taylorInvSqrt(vec4(dot(p0,p0), dot(p1,p1), dot(p2,p2), dot(p3,p3)));
            p0 *= norm.x; p1 *= norm.y; p2 *= norm.z; p3 *= norm.w;
            vec4 m = max(0.6 - vec4(dot(x0,x0), dot(x1,x1), dot(x2,x2), dot(x3,x3)), 0.0);
            m = m * m;
            return 42.0 * dot(m*m, vec4(dot(p0,x0), dot(p1,x1), dot(p2,x2), dot(p3,x3)));
        }

        void main() {
            vec4 modelPosition = modelMatrix * vec4(position, 1.0);
            vec2 noiseCoord = uv * vec2(uFrequency.x, uFrequency.y);
            float noise = snoise(vec3(
                noiseCoord.x + uTime * 0.02,
                noiseCoord.y,
                uTime * uSpeed
            ));
            modelPosition.y += noise * uAmount;

            vColor = uColor[4];
            for(int i = 0; i < 4; i++){
                float noiseFlow = 0.0002 + float(i) * 0.05;
                float noiseSpeed = 0.0001 + float(i) * 0.03;
                float noiseSeed = 1.0 + float(i) * 10.0;
                float noiseCeiling = 0.6 + float(i) * 0.08;
                float n = smoothstep(0.1, noiseCeiling, snoise(vec3(
                    noiseCoord.x *0.3 + uTime * noiseFlow,
                    noiseCoord.y * 0.6,
                    uTime * noiseSpeed + noiseSeed
                )));
                vColor = mix(vColor, uColor[i], n);
            }

            gl_Position = projectionMatrix * viewMatrix * modelPosition;
            vUv = uv;
        }
    `;

    const fragmentShader = `
        precision mediump float;
        varying vec3 vColor;
        void main(){
            gl_FragColor = vec4(vColor, 1.0);
        }
    `;

    
    const uniforms = {
        uTime:{ value: 0 },
        uAmount:    { value: 0.06 },
        uSpeed:     { value: 0.02 },
        uFrequency: { value: new THREE.Vector2(3, 6) },
        uColor: {
            value: [
                new THREE.Color("#4ACF61"),
                new THREE.Color("#D0D3D5"),
                new THREE.Color("#023047"),
                new THREE.Color("#73DB67"),
                new THREE.Color("#5C5656")
            ]
        }
    };

    const geometry = new THREE.PlaneGeometry(1.5, 1.5, 200, 200);
    const material = new THREE.ShaderMaterial({
        vertexShader,
        fragmentShader,
        uniforms,
        wireframe: false
    });
    const mesh = new THREE.Mesh(geometry, material);
    mesh.rotation.x = -Math.PI / 2;
    scene.add(mesh);

    const clock = new THREE.Clock();
    function animate() {
        requestAnimationFrame(animate);
        uniforms.uTime.value = clock.getElapsedTime();
        renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
})();
</script>

                history.replaceState(null, null, " ");
            } else {
                history.pushState(null, null, `#${id}`);
            }
        });
    });

</script>
<script>
    var toplink = document.getElementById("top-link");
    window.onscroll = function () {
        const scrollThreshold = window.innerHeight;
        if (document.body.scrollTop > scrollThreshold || document.documentElement.scrollTop > scrollThreshold) {
            toplink.classList.remove("hidden");
        } else {
            toplink.classList.add("hidden");
        }
    };

</script>
<script>
    document.getElementById("theme-toggle").addEventListener("click", () => {
        const html = document.querySelector("html");
        if (html.dataset.theme === "dark") {
            html.dataset.theme = 'light';
            localStorage.setItem("pref-theme", 'light');
        } else {
            html.dataset.theme = 'dark';
            localStorage.setItem("pref-theme", 'dark');
        }
    })

</script>
</body>
